name: Build & Validate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'

    - name: Validate composer.json
      run: composer validate --strict

    - name: PHP Syntax Check
      run: find . -name "*.php" -not -path "./.github/*" -not -path "./vendor/*" -exec php -l {} \;

    - name: Prepare Plugin Directory
      run: |
        mkdir -p paksa-cart-recovery
        cp -r admin assets includes languages templates paksa-cart-recovery/
        cp paksa-cart-recovery.php index.php uninstall.php composer.json readme.txt paksa-cart-recovery/

    - name: Upload Installable Plugin
      uses: actions/upload-artifact@v4
      with:
        name: paksa-cart-recovery
        path: paksa-cart-recovery/
